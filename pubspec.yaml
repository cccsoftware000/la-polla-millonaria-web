name: la_polla_millonaria
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.3

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.15.2
  firebase_auth: ^5.5.0
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  cloud_firestore: ^5.6.0
  cloud_functions: ^5.0.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  flutter_launcher_icons: ^0.13.1
  shared_preferences: ^2.5.3
  cached_network_image: ^3.3.1
  # Para autenticación con Google
  google_sign_in: ^6.1.5
  intl: ^0.19.0
  url_launcher: ^6.2.5
  http: ^1.1.0
  path_provider: ^2.1.0
  open_file: ^3.3.2
  permission_handler: ^11.0.0
  package_info_plus: ^10.1.0
  device_info_plus: ^13.1.0
  flutter_dotenv: ^5.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # 👇 AGREGAR ESTO (con la indentación correcta)
  assets:
    - assets/logos/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logos/logoApp.png"
  adaptive_icon_background: "#7B2FF7"
  adaptive_icon_foreground: "assets/logos/logoApp.png"